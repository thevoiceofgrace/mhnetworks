<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamVault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial;
}

body{

background:#0f0f23;
color:white;

}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:#14142a;
border-bottom:1px solid rgba(255,255,255,0.05);

}

.logo{

font-size:22px;
font-weight:700;
color:#5cc8ff;

}

.wallet-area{

display:flex;
align-items:center;
gap:12px;

}

.balance{

background:#1e1e3f;
padding:8px 14px;
border-radius:12px;
font-size:14px;

}

.connect-btn{

background:linear-gradient(135deg,#53f 0%,#00d4ff 100%);
border:none;
padding:10px 18px;
border-radius:14px;
color:white;
font-weight:600;
cursor:pointer;

}

/* HERO */

.hero{

text-align:center;
padding:60px 20px;

}

.hero h1{

font-size:42px;
margin-bottom:10px;

}

.hero p{

color:#aaa;

}

/* VAULT CARD */

.vault{

max-width:420px;
margin:auto;
margin-top:30px;

background:#1b1b3a;

padding:25px;

border-radius:18px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);

}

.vault input{

width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:12px;
background:#101025;
color:white;

}

.vault button{

width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#5b6cff;
color:white;
font-weight:600;
cursor:pointer;

}

/* PRICE TICKER */

.ticker{

margin-top:40px;
overflow:hidden;
white-space:nowrap;
background:#14142a;
padding:14px;

}

.ticker span{

margin-right:40px;
font-size:14px;

}

/* MOBILE */

@media(max-width:600px){

.hero h1{

font-size:30px;

}

.navbar{

padding:12px 16px;

}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">DreamVault</div>

<div class="wallet-area">

<div class="balance" id="walletBalance">0 TRX</div>

<button class="connect-btn" onclick="connectWallet()">Connect</button>

</div>

</div>


<!-- HERO -->

<div class="hero">

<h1>Secure TRX Vault</h1>

<p>Deposit TRX securely with time-locked withdrawals</p>

</div>


<!-- VAULT -->

<div class="vault">

<h3>Deposit TRX</h3>

<input id="depositAmount" placeholder="Amount TRX">

<button onclick="deposit()">Deposit</button>

<h3 style="margin-top:20px;">Withdraw</h3>

<input id="withdrawAmount" placeholder="Amount TRX">

<button onclick="requestWithdraw()">Request Withdrawal</button>

</div>


<!-- PRICE TICKER -->

<div class="ticker" id="ticker">

Loading TRON market prices...

</div>


<script>

const CONTRACT_ADDRESS="TBeGfACgzyYZcvkiYbCYKpnnddVmpCRdwp"

let tronWeb
let contract
let address

async function connectWallet(){

if(!window.tronWeb){

alert("Install TronLink")

return

}

await window.tronWeb.request({method:"tron_requestAccounts"})

while(!window.tronWeb.defaultAddress.base58){

await new Promise(r=>setTimeout(r,200))

}

tronWeb=window.tronWeb

address=tronWeb.defaultAddress.base58

contract=await tronWeb.contract().at(CONTRACT_ADDRESS)

loadBalance()

}

async function loadBalance(){

const balance=await tronWeb.trx.getBalance(address)

document.getElementById("walletBalance").innerText=

tronWeb.fromSun(balance)+" TRX"

}

async function deposit(){

const amount=document.getElementById("depositAmount").value

await contract.deposit().send({

callValue:tronWeb.toSun(amount),

feeLimit:100000000

})

loadBalance()

}

async function requestWithdraw(){

const amount=document.getElementById("withdrawAmount").value

await contract.requestWithdrawal(tronWeb.toSun(amount)).send({

feeLimit:100000000

})

}

/* PRICE TICKER */

async function loadPrices(){

const res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tron,just,sun-token,wink&vs_currencies=usd&include_24hr_change=true")

const data=await res.json()

let ticker=""

ticker+=`TRX $${data.tron.usd} (${data.tron.usd_24h_change.toFixed(2)}%)`

ticker+=` | JST $${data.just.usd}`

ticker+=` | SUN $${data["sun-token"].usd}`

ticker+=` | WIN $${data.wink.usd}`

document.getElementById("ticker").innerText=ticker

}

loadPrices()

setInterval(loadPrices,15000)

</script>

</body>

</html>
